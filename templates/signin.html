<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Snai3i Points Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #F2A807;
      --primary-hover: #d99206;
      --navy: #1F1F38;
      --muted: #6b7280;
      --border: #e5e7eb;
      --card: #ffffff;
      --error: #ef4444;
      --radius: 4px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f9f9fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px 32px;
    }

    /* LOGO */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-wrap img { height: 36px; }
    .divider-v { width: 1px; height: 20px; background: var(--border); }
    .brand-label { font-weight: 800; font-size: 14px; color: var(--navy); letter-spacing: -0.3px; }

    /* HEADING */
    h1 { font-size: 20px; font-weight: 800; color: var(--navy); text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    /* DIVIDER */
    .or-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .or-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
    .or-divider span { font-size: 12px; color: var(--muted); font-weight: 600; }

    /* FIELDS */
    label { display: block; font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: var(--navy);
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(242,168,7,0.12); }

    .field { margin-bottom: 16px; }

    /* PASSWORD TOGGLE */
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 44px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; display: flex; align-items: center;
    }
    .toggle-pw:hover { color: var(--navy); }

    /* DJANGO ERROR */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--error);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* SUBMIT */
    .submit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.2px;
      box-shadow: 0 2px 12px rgba(242,168,7,0.3);
    }
    .submit-btn:hover { background: var(--primary-hover); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    .footer-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 22px; }
  </style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="https://snai3i.org/assets/logo-M8ZZgvtS.svg" alt="Snai3i" />
    <div class="divider-v"></div>
    <span class="brand-label">Points Tracker</span>
  </div>

  <h1>Sign in to Point Keeper</h1>
  <p class="subtitle">Welcome back! Please sign in to continue</p>

  <div class="or-divider">
    <hr /><span>sign in with email</span><hr />
  </div>

  <!-- Django error -->
  {% if error %}
  <div class="error-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" novalidate id="signin-form">
    {% csrf_token %}

    <div class="field">
      <label for="email-input">Email address</label>
      <input type="email" name="email" id="email-input"
             placeholder="Enter your email address" required autofocus />
    </div>

    <div class="field">
      <label for="pw-input">Password</label>
      <div class="password-wrap">
        <input type="password" name="password" id="pw-input"
               placeholder="Enter your password" required />
        <button type="button" class="toggle-pw" onclick="togglePw()" title="Show/hide password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">
      <span id="btn-text">Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <p class="footer-note">Contact your admin if you need access.</p>
</div>

<script>
  function togglePw() {
    const pw   = document.getElementById('pw-input');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      pw.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  document.getElementById('signin-form').addEventListener('submit', function () {
    document.getElementById('btn-text').style.display  = 'none';
    document.getElementById('spinner').style.display   = 'inline-block';
    document.getElementById('submit-btn').disabled     = true;
  });
</script>

</body>
</html>
